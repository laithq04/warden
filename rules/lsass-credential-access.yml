id: WARDEN-0010
title: LSASS Memory Credential Dumping
severity: critical
mitre:
  tactic: Credential Access
  techniqueId: T1003.001
description: >
  Detects command lines associated with dumping LSASS process memory,
  including procdump targeting lsass, the comsvcs.dll MiniDump technique,
  and mimikatz sekurlsa usage. LSASS memory holds plaintext credentials and
  hashes for logged-on users, so a hit is a near-certain compromise signal.
detection:
  selection:
    action:
      equals: process_create
    process:
      regex: '(?i:procdump.*lsass|rundll32.*comsvcs(\.dll)?.*minidump|mimikatz|sekurlsa::|lsass\.dmp)'
  condition: selection
